---
- name: Démonstration de block/rescue/always
  hosts: local
  gather_facts: true
  vars:
    repertoire_demo: /tmp/erreurs_demo
    simuler_echec: false

  tasks:
    - name: Créer le répertoire de démo
      ansible.builtin.file:
        path: "{{ repertoire_demo }}"
        state: directory
        mode: '0755'

    # Bloc avec gestion d'erreur complète
    - name: Bloc de déploiement avec gestion d'erreur
      block:
        - name: Étape 1 - Sauvegarde
          ansible.builtin.copy:
            content: "sauvegarde_{{ ansible_date_time.epoch }}\n"
            dest: "{{ repertoire_demo }}/sauvegarde.txt"
            mode: '0644'

        - name: Étape 2 - Déploiement (peut échouer)
          ansible.builtin.command:
            cmd: "{{ 'false' if simuler_echec else 'true' }}"
          register: resultat_deploiement

        - name: Étape 3 - Validation post-déploiement
          ansible.builtin.copy:
            content: "deploiement_reussi={{ ansible_date_time.date }}\n"
            dest: "{{ repertoire_demo }}/statut.txt"
            mode: '0644'

      rescue:
        - name: Gestion d'erreur - Notification
          ansible.builtin.debug:
            msg: "Échec du déploiement détecté ! Déclenchement du rollback..."

        - name: Rollback - Restauration depuis la sauvegarde
          ansible.builtin.copy:
            content: "rollback_effectue={{ ansible_date_time.date }}\n"
            dest: "{{ repertoire_demo }}/statut.txt"
            mode: '0644'

        - name: Marquer l'échec
          ansible.builtin.fail:
            msg: "Déploiement échoué et rollback effectué. Vérifier les logs."

      always:
        - name: Nettoyage et rapport final (toujours exécuté)
          ansible.builtin.debug:
            msg: "Déploiement terminé - statut dans {{ repertoire_demo }}/statut.txt"

        - name: Horodatage de fin
          ansible.builtin.copy:
            content: "fin={{ ansible_date_time.iso8601 }}\n"
            dest: "{{ repertoire_demo }}/fin.txt"
            mode: '0644'
