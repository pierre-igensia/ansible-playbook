---
- name: Démonstration de la gestion des erreurs
  hosts: local
  gather_facts: false
  vars:
    repertoire_demo: /tmp/erreurs_demo

  tasks:
    - name: Créer le répertoire de démo
      ansible.builtin.file:
        path: "{{ repertoire_demo }}"
        state: directory
        mode: '0755'

    # Exemple 1 : ignore_errors
    - name: Commande qui échoue (ignorée)
      ansible.builtin.command:
        cmd: "cat /fichier_inexistant_12345"
      ignore_errors: true
      register: resultat_echec

    - name: Afficher le résultat de la commande échouée
      ansible.builtin.debug:
        msg: "Commande échouée avec RC={{ resultat_echec.rc }} - mais on continue !"

    # Exemple 2 : failed_when personnalisé
    - name: Vérification avec failed_when
      ansible.builtin.command:
        cmd: "echo 'STATUT: OK'"
      register: verification
      failed_when: "'ERREUR' in verification.stdout"
      changed_when: false

    - name: Résultat de la vérification
      ansible.builtin.debug:
        msg: "Vérification réussie : {{ verification.stdout }}"

    # Exemple 3 : failed_when qui déclencherait un échec
    - name: Simulation d'un statut d'erreur (ignorée pour la démo)
      ansible.builtin.command:
        cmd: "echo 'STATUT: ERREUR critique détectée'"
      register: statut_erreur
      # La condition 'and false' empêche le déclenchement réel de l'échec dans cette démo
      failed_when: "'ERREUR' in statut_erreur.stdout and false"
      changed_when: false

    # Exemple 4 : changed_when pour l'idempotence
    - name: Script idempotent (jamais marqué changed)
      ansible.builtin.command:
        cmd: "date"
      register: date_resultat
      changed_when: false

    - name: Afficher la date
      ansible.builtin.debug:
        msg: "Date actuelle : {{ date_resultat.stdout }}"

    - name: Résumé des démonstrations
      ansible.builtin.debug:
        msg:
          - "✅ ignore_errors : continue malgré l'erreur"
          - "✅ failed_when : condition d'échec personnalisée"
          - "✅ changed_when: false : tâche toujours 'ok'"
