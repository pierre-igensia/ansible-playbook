---
# Ce fichier documente les équivalents en playbook des commandes ad-hoc
- name: Exemples de commandes ad-hoc en playbook
  hosts: local
  gather_facts: true

  tasks:
    - name: Exécuter une commande shell
      ansible.builtin.command:
        cmd: uptime
      register: uptime_result

    - name: Afficher le résultat
      ansible.builtin.debug:
        var: uptime_result.stdout

    - name: Copier un fichier
      ansible.builtin.copy:
        content: "Créé par Ansible ad-hoc\n"
        dest: /tmp/ansible_test.txt
        mode: '0644'

    - name: Obtenir des informations sur un fichier
      ansible.builtin.stat:
        path: /tmp/ansible_test.txt
      register: file_info

    - name: Afficher les informations du fichier
      ansible.builtin.debug:
        msg: "Taille: {{ file_info.stat.size }} octets, Mode: {{ file_info.stat.mode }}"
