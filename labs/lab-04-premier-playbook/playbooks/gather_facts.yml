---
- name: Exploration des facts Ansible
  hosts: local
  gather_facts: true

  tasks:
    - name: Afficher le système d'exploitation
      ansible.builtin.debug:
        msg: "OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    - name: Afficher les informations réseau
      ansible.builtin.debug:
        msg: "IP: {{ ansible_facts['default_ipv4']['address'] | default('N/A') }}"

    - name: Afficher la mémoire disponible
      ansible.builtin.debug:
        msg: "RAM: {{ ansible_facts['memtotal_mb'] }} MB total, {{ ansible_facts['memfree_mb'] }} MB libre"

    - name: Afficher le nombre de CPUs
      ansible.builtin.debug:
        msg: "CPUs: {{ ansible_facts['processor_vcpus'] }}"
