---
- name: Exploration des facts Ansible
  hosts: local
  gather_facts: true

  tasks:
    - name: Afficher le système d'exploitation
      ansible.builtin.debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Afficher les informations réseau
      ansible.builtin.debug:
        msg: "IP: {{ ansible_default_ipv4.address | default('N/A') }}"

    - name: Afficher la mémoire disponible
      ansible.builtin.debug:
        msg: "RAM: {{ ansible_memtotal_mb }} MB total, {{ ansible_memfree_mb }} MB libre"

    - name: Afficher le nombre de CPUs
      ansible.builtin.debug:
        msg: "CPUs: {{ ansible_processor_vcpus }}"
