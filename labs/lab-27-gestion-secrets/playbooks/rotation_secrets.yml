---
- name: Démonstration de rotation de secrets
  hosts: local
  gather_facts: false
  vars:
    vault_addr: "http://localhost:8200"
    vault_token: "formation-token"
  tasks:
    - name: Créer le répertoire de démonstration
      ansible.builtin.file:
        path: /tmp/rotation_secrets
        state: directory
        mode: '0755'

    - name: Générer un nouveau mot de passe aléatoire
      ansible.builtin.set_fact:
        nouveau_mot_de_passe: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits,punctuation') }}"
      no_log: true

    - name: "📋 Workflow de rotation"
      ansible.builtin.debug:
        msg: |
          === Étapes de rotation d'un secret ===
          1. ✅ Générer un nouveau secret (fait)
          2. Stocker dans le gestionnaire de secrets
          3. Mettre à jour l'application
          4. Valider le nouveau secret
          5. Invalider l'ancien secret
          6. Journaliser la rotation

    - name: Simuler la mise à jour de l'application
      ansible.builtin.copy:
        content: |
          # Configuration mise à jour
          # Rotation effectuée le {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          [database]
          password=***NOUVEAU_SECRET***
          rotation_date={{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
        dest: /tmp/rotation_secrets/app_config_rotated.conf
        mode: '0600'

    - name: Journaliser la rotation
      ansible.builtin.copy:
        content: |
          === Journal de rotation ===
          Date : {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          Secret : database/password
          Action : Rotation effectuée
          Statut : Succès
        dest: /tmp/rotation_secrets/rotation.log
        mode: '0644'

    - name: Résumé
      ansible.builtin.debug:
        msg: "Rotation simulée avec succès. Logs dans /tmp/rotation_secrets/"
