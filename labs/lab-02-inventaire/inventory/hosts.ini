# Inventaire INI - Format classique
[webservers]
web01 ansible_host=192.168.1.10 ansible_user=ubuntu
web02 ansible_host=192.168.1.11 ansible_user=ubuntu

[databases]
db01 ansible_host=192.168.1.20 ansible_user=ubuntu

[loadbalancers]
lb01 ansible_host=192.168.1.30 ansible_user=ubuntu

[production:children]
webservers
databases
loadbalancers

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
