---
- name: Créer le répertoire NGINX
  ansible.builtin.file:
    path: "{{ lb_racine }}"
    state: directory
    mode: '0755'

- name: Déployer la configuration NGINX
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ lb_racine }}/nginx.conf"
    mode: '0644'
  notify: Recharger NGINX

- name: Journaliser le déploiement du load balancer
  ansible.builtin.copy:
    content: "Load balancer NGINX configuré sur {{ lb_serveur_nom }}:{{ lb_port }} - {{ ansible_date_time.iso8601 }}\n"
    dest: "{{ lb_racine }}/deploy.log"
    mode: '0644'
