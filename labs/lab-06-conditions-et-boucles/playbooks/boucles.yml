---
- name: Démonstration des boucles
  hosts: local
  gather_facts: false
  vars:
    users:
      - name: alice
        shell: /bin/bash
        groups: [sudo, docker]
      - name: bob
        shell: /bin/sh
        groups: [www-data]
      - name: charlie
        shell: /bin/bash
        groups: [sudo]

    dev_packages:
      - git
      - vim
      - curl

    config_files:
      nginx: /tmp/nginx.conf
      apache: /tmp/apache.conf
      mysql: /tmp/mysql.conf

  tasks:
    - name: Boucle simple sur une liste
      ansible.builtin.debug:
        msg: "Paquet à installer : {{ item }}"
      loop: "{{ dev_packages }}"

    - name: Boucle sur une liste de dictionnaires
      ansible.builtin.debug:
        msg: "Utilisateur : {{ item.name }}, Shell : {{ item.shell }}, Groupes : {{ item.groups | join(', ') }}"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Boucle sur un dictionnaire avec dict2items
      ansible.builtin.debug:
        msg: "Service '{{ item.key }}' -> fichier : {{ item.value }}"
      loop: "{{ config_files | dict2items }}"

    - name: Créer plusieurs fichiers avec une boucle
      ansible.builtin.copy:
        content: "# Config {{ item.key }}\ncreated_by=ansible\n"
        dest: "{{ item.value }}"
        mode: '0644'
      loop: "{{ config_files | dict2items }}"

    - name: Boucle avec index (loop_control)
      ansible.builtin.debug:
        msg: "[{{ my_idx + 1 }}/{{ dev_packages | length }}] Traitement de : {{ item }}"
      loop: "{{ dev_packages }}"
      loop_control:
        index_var: my_idx

    - name: Boucle avec until (retry)
      ansible.builtin.command:
        cmd: "echo 'tentative'"
      register: result
      until: result.rc == 0
      retries: 3
      delay: 1
      changed_when: false

- name: Simulation de déploiement
  hosts: local
  gather_facts: false
  vars:
    delay_seconds: 1
    components:
      - { name: "database" }
      - { name: "auth-service" }
      - { name: "api-backend" }
      - { name: "frontend" }

  tasks:
    # Use include_tasks to combine debug + pause per component,
    # avoiding the scope issue where pause inside loop_control
    # conflicts with loop variable resolution.
    - name: Déployer les composants un par un
      ansible.builtin.include_tasks: deploy_component.yml
      loop: "{{ components }}"
      loop_control:
        index_var: idx
        label: "{{ item.name }}"
