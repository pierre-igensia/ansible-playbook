---
- name: Créer le répertoire web
  ansible.builtin.file:
    path: "{{ serveur_web_racine }}"
    state: directory
    mode: '0755'

- name: Créer le répertoire de configuration
  ansible.builtin.file:
    path: /etc/serveur-web
    state: directory
    mode: '0755'

- name: Déployer la page d'accueil
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ serveur_web_racine }}/index.html"
    mode: '0644'

- name: Déployer la configuration
  ansible.builtin.template:
    src: config.conf.j2
    dest: /etc/serveur-web/config.conf
    mode: '0644'
  notify: Recharger la configuration
