---
name: Ansible CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Linting Ansible
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install ansible ansible-lint yamllint

      - name: Vérifier YAML
        run: yamllint .

      - name: Vérifier Ansible
        run: ansible-lint

  syntax:
    name: Vérification syntaxe
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python et Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Ansible
        run: pip install ansible

      - name: Vérifier la syntaxe des playbooks
        run: |
          find . -name "*.yml" -path "*/playbooks/*" -exec \
            ansible-playbook {} --syntax-check \;

  molecule:
    name: Tests Molecule
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install ansible molecule molecule-plugins[docker] pytest-testinfra

      - name: Lancer les tests Molecule
        run: |
          cd roles/mon-role/
          molecule test
        continue-on-error: true
